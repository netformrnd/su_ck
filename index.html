<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상비물품 체크리스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#F1F5F9;--card:#FFF;--primary:#1B2A4A;--primary-light:#2C4A7C;--primary-pale:#DBEAFE;--accent:#3B82F6;--accent-light:#DBEAFE;--danger:#EF4444;--danger-light:#FEF2F2;--text:#1E293B;--text-sub:#64748B;--border:#E2E8F0;--shadow:0 2px 12px rgba(0,0,0,.06);--shadow-lg:0 8px 32px rgba(0,0,0,.08);--radius:14px;--complete:#10B981;--incomplete:#F59E0B;--sub-bg:#F8FAFC;--sub-border:#E2E8F0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px}

/* ═══ HEADER ═══ */
.header{background:var(--primary);color:#fff;padding:36px 24px 56px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.06)}
.header::after{content:'';position:absolute;bottom:-40px;left:30%;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.04)}
.header-inner{max-width:920px;margin:0 auto;position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between}
.header-left{}
.header-icon{font-size:32px;margin-bottom:10px}
.header h1{font-family:'Outfit','Noto Sans KR',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.header p{font-size:13px;opacity:.7;font-weight:300}

/* ═══ FLOOR SELECTOR ═══ */
.floor-bar{max-width:920px;margin:-28px auto 0;padding:0 16px;position:relative;z-index:11;display:flex;gap:0}
.floor-btn{flex:1;padding:12px 0;border:none;background:rgba(255,255,255,.55);backdrop-filter:blur(6px);font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;color:var(--text-sub);cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:8px}
.floor-btn:first-child{border-radius:14px 0 0 0}
.floor-btn:last-child{border-radius:0 14px 0 0}
.floor-btn:hover{background:rgba(255,255,255,.8);color:var(--text)}
.floor-btn.active{background:var(--bg);color:var(--primary);box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.floor-badge{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;background:var(--accent);color:#fff;padding:1px 8px;border-radius:100px;min-width:22px;text-align:center}
.floor-badge.zero{background:var(--border);color:var(--text-sub)}

/* ═══ TABS ═══ */
.space-tabs-wrap{max-width:920px;margin:0 auto;padding:0 16px;position:relative;z-index:10}
.space-tabs{display:flex;gap:6px;align-items:end;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.space-tabs::-webkit-scrollbar{display:none}
.space-tab{padding:12px 22px 10px;border-radius:14px 14px 0 0;background:rgba(255,255,255,.65);backdrop-filter:blur(6px);border:none;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:600;color:var(--text-sub);cursor:pointer;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px}
.space-tab:hover{background:rgba(255,255,255,.85);color:var(--text)}
.space-tab.active{background:var(--bg);color:var(--primary);font-weight:700;box-shadow:0 -2px 8px rgba(0,0,0,.04)}
.tab-badge{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;background:var(--accent);color:#fff;padding:1px 7px;border-radius:100px;min-width:20px;text-align:center}
.tab-badge.zero{background:var(--border);color:var(--text-sub)}
.tab-edit-btn{width:20px;height:20px;border:none;background:0 0;cursor:pointer;font-size:11px;color:var(--text-sub);border-radius:4px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.space-tab:hover .tab-edit-btn,.space-tab.active .tab-edit-btn{opacity:1}
.tab-edit-btn:hover{background:rgba(0,0,0,.06)}
.add-space-tab{padding:10px 16px;border-radius:14px 14px 0 0;background:0 0;border:2px dashed var(--border);font-size:18px;color:var(--text-sub);cursor:pointer;transition:all .2s;flex-shrink:0;font-family:'Noto Sans KR',sans-serif}
.add-space-tab:hover{border-color:var(--primary);color:var(--primary);background:rgba(255,255,255,.5)}

.stats-bar{max-width:920px;margin:16px auto;padding:0 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);text-align:center}
.stat-num{font-family:'Outfit',sans-serif;font-size:26px;font-weight:800;line-height:1}
.stat-num.green{color:var(--complete)}.stat-num.orange{color:var(--incomplete)}.stat-num.red{color:var(--danger)}
.stat-label{font-size:11px;color:var(--text-sub);margin-top:3px;font-weight:500}

.controls{max-width:920px;margin:0 auto 14px;padding:0 16px;display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{border:1.5px solid var(--border);background:var(--card);padding:7px 15px;border-radius:100px;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:500;color:var(--text-sub);cursor:pointer;transition:all .2s}
.filter-btn:hover{border-color:var(--primary);color:var(--primary)}
.filter-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.btn-action{margin-left:auto;border:none;background:var(--accent);color:#fff;padding:7px 16px;border-radius:100px;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px}
.btn-action:hover{background:#C06830;transform:translateY(-1px)}

.container{max-width:920px;margin:0 auto;padding:0 16px}
.category{margin-bottom:18px;animation:fadeUp .35s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.cat-header{display:flex;align-items:center;gap:6px;padding:8px 4px;user-select:none}
.cat-icon-btn{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;border:none;cursor:pointer;transition:transform .15s}
.cat-icon-btn:hover{transform:scale(1.12)}
.cat-title-edit{font-weight:700;font-size:15px;flex:1;border:none;background:0 0;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;padding:4px 8px;border-radius:8px;transition:background .2s;min-width:0}
.cat-title-edit:hover{background:rgba(0,0,0,.04)}.cat-title-edit:focus{background:#fff;box-shadow:0 0 0 2px var(--primary-pale)}
.cat-count{font-size:11px;color:var(--text-sub);background:var(--bg);padding:3px 10px;border-radius:100px;font-weight:500;white-space:nowrap}
.small-btn{width:24px;height:24px;border-radius:6px;border:none;background:0 0;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text-sub);flex-shrink:0}
.small-btn:hover{background:rgba(0,0,0,.06);color:var(--text)}
.small-btn.del:hover{background:var(--danger-light);color:var(--danger)}
.cat-toggle{font-size:16px;color:var(--text-sub);cursor:pointer;transition:transform .3s;padding:4px;border:none;background:none}
.cat-toggle.collapsed{transform:rotate(-90deg)}
.cat-body{overflow:hidden;transition:max-height .35s ease}

.drag-handle{width:22px;height:22px;display:flex;align-items:center;justify-content:center;cursor:grab;color:#C5C0B8;font-size:14px;flex-shrink:0;border-radius:4px;transition:all .15s;user-select:none;touch-action:none}
.drag-handle:hover{color:var(--primary);background:var(--primary-pale)}
.drag-handle:active{cursor:grabbing}
.drag-handle svg{width:14px;height:14px;pointer-events:none}
.dragging{opacity:.4;transform:scale(.97)}
.drag-over-top{box-shadow:0 -3px 0 0 var(--primary)!important}
.drag-over-bottom{box-shadow:0 3px 0 0 var(--primary)!important}

.item-card{background:var(--card);border-radius:var(--radius);margin-bottom:7px;box-shadow:var(--shadow);transition:all .2s;border:1.5px solid transparent;overflow:hidden}
.item-card:hover{border-color:var(--primary-pale)}
.item-card.needs-purchase{border-left:3px solid var(--accent)}
.item-card.completed .item-main{opacity:.5}
.item-main{display:grid;grid-template-columns:auto auto 1fr auto auto auto auto;align-items:center;gap:8px;padding:11px 12px}

.need-check{width:22px;height:22px;border:2px solid var(--border);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.need-check:hover{border-color:var(--accent)}
.need-check.checked{background:var(--accent);border-color:var(--accent)}
.need-check.checked::after{content:'✓';color:#fff;font-size:13px;font-weight:700}
.item-info{min-width:0;display:flex;flex-direction:column;gap:1px}
.item-name-edit{font-weight:600;font-size:13.5px;border:none;background:0 0;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;padding:2px 6px;border-radius:6px;width:100%;transition:background .2s}
.item-name-edit:hover{background:rgba(0,0,0,.03)}.item-name-edit:focus{background:#fff;box-shadow:0 0 0 2px var(--primary-pale)}
.item-note-edit{font-size:11px;color:var(--text-sub);border:none;background:0 0;font-family:'Noto Sans KR',sans-serif;outline:none;padding:1px 6px;border-radius:4px;width:100%;transition:background .2s}
.item-note-edit::placeholder{color:#C5C0B8}.item-note-edit:hover{background:rgba(0,0,0,.02)}.item-note-edit:focus{background:#fff;box-shadow:0 0 0 1.5px var(--primary-pale)}
.expand-toggle{width:26px;height:26px;border-radius:7px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:var(--text-sub);flex-shrink:0;position:relative}
.expand-toggle:hover{border-color:var(--primary);color:var(--primary)}
.expand-toggle .badge{position:absolute;top:-5px;right:-5px;background:var(--primary);color:#fff;font-size:9px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif}
.expand-toggle.open{background:var(--primary-pale);border-color:var(--primary);color:var(--primary)}
.qty-control{display:flex;align-items:center;gap:2px;opacity:0;pointer-events:none;transition:all .2s}
.item-card.needs-purchase .qty-control{opacity:1;pointer-events:auto}
.qty-btn{width:25px;height:25px;border-radius:7px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:14px;font-weight:700;color:var(--text-sub);display:flex;align-items:center;justify-content:center;transition:all .15s}
.qty-btn:hover{border-color:var(--primary);color:var(--primary)}
.qty-value{font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;width:28px;text-align:center}
.status-toggle{padding:4px 11px;border-radius:100px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:'Noto Sans KR',sans-serif;transition:all .2s;white-space:nowrap}
.status-toggle.incomplete{background:var(--accent-light);color:var(--accent)}
.status-toggle.complete{background:#E8F5E9;color:var(--complete)}
.item-delete{width:24px;height:24px;border-radius:6px;border:none;background:0 0;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;color:#CCC;flex-shrink:0}
.item-delete:hover{background:var(--danger-light);color:var(--danger)}

.sub-panel{background:var(--sub-bg);border-top:1px solid var(--sub-border);padding:0;max-height:0;overflow:hidden;transition:max-height .3s ease}
.sub-panel.open{padding:10px 14px 10px 46px;max-height:2000px}
.sub-item{display:grid;grid-template-columns:auto auto 1fr auto auto auto;align-items:center;gap:6px;padding:7px 10px;background:var(--card);border-radius:10px;margin-bottom:5px;border:1px solid var(--sub-border);transition:all .15s}
.sub-item:hover{border-color:var(--primary-pale)}
.sub-item.sub-needs{border-left:3px solid var(--accent)}
.sub-item.sub-done{opacity:.5}
.sub-check{width:18px;height:18px;border:2px solid var(--border);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.sub-check:hover{border-color:var(--accent)}
.sub-check.checked{background:var(--accent);border-color:var(--accent)}
.sub-check.checked::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.sub-name-edit{font-weight:500;font-size:13px;border:none;background:0 0;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;padding:2px 6px;border-radius:5px;width:100%;transition:background .2s}
.sub-name-edit:hover{background:rgba(0,0,0,.03)}.sub-name-edit:focus{background:#fff;box-shadow:0 0 0 2px var(--primary-pale)}
.sub-qty{display:flex;align-items:center;gap:1px;opacity:0;pointer-events:none;transition:all .2s}
.sub-item.sub-needs .sub-qty{opacity:1;pointer-events:auto}
.sub-qty-btn{width:22px;height:22px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:12px;font-weight:700;color:var(--text-sub);display:flex;align-items:center;justify-content:center}
.sub-qty-btn:hover{border-color:var(--primary);color:var(--primary)}
.sub-qty-val{font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;width:24px;text-align:center}
.sub-status{padding:3px 9px;border-radius:100px;font-size:10px;font-weight:600;cursor:pointer;border:none;font-family:'Noto Sans KR',sans-serif;white-space:nowrap}
.sub-status.incomplete{background:var(--accent-light);color:var(--accent)}
.sub-status.complete{background:#E8F5E9;color:var(--complete)}
.sub-del{width:22px;height:22px;border-radius:5px;border:none;background:0 0;cursor:pointer;font-size:11px;color:#CCC;display:flex;align-items:center;justify-content:center}
.sub-del:hover{background:var(--danger-light);color:var(--danger)}
.sub-add-row{display:flex;gap:6px;margin-top:4px}
.sub-add-input{flex:1;border:1.5px dashed var(--sub-border);border-radius:8px;padding:7px 12px;font-size:12px;font-family:'Noto Sans KR',sans-serif;background:0 0;color:var(--text);outline:none}
.sub-add-input::placeholder{color:#C5C0B8}.sub-add-input:focus{border-color:var(--primary)}
.sub-add-btn{width:32px;height:32px;border-radius:8px;border:none;background:var(--primary);color:#fff;font-size:16px;cursor:pointer;flex-shrink:0}
.sub-add-btn:hover{background:var(--primary-light);transform:scale(1.05)}
.add-item-row{display:flex;gap:8px;padding:6px 0}
.add-input{flex:1;border:1.5px dashed var(--border);border-radius:10px;padding:9px 14px;font-size:13px;font-family:'Noto Sans KR',sans-serif;background:0 0;color:var(--text);outline:none}
.add-input::placeholder{color:#BFBAB2}.add-input:focus{border-color:var(--primary)}
.add-btn{width:38px;height:38px;border-radius:10px;border:none;background:var(--primary);color:#fff;font-size:20px;cursor:pointer;flex-shrink:0}
.add-btn:hover{background:var(--primary-light);transform:scale(1.05)}
.add-category-row{max-width:920px;margin:8px auto 0;padding:0 16px}
.add-cat-btn{width:100%;border:2px dashed var(--border);border-radius:var(--radius);padding:12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:600;color:var(--text-sub);background:0 0;cursor:pointer;transition:all .2s}
.add-cat-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-pale)}
.footer-actions{max-width:920px;margin:20px auto 0;padding:0 16px;display:flex;gap:10px;flex-wrap:wrap}
.footer-btn{border:1.5px solid var(--border);background:var(--card);padding:9px 18px;border-radius:var(--radius);font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:600;color:var(--text);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.footer-btn:hover{border-color:var(--primary);color:var(--primary)}
.footer-btn.danger:hover{border-color:var(--danger);color:var(--danger)}

/* ═══ MODAL ═══ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;justify-content:center;align-items:center;backdrop-filter:blur(2px)}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:20px;padding:24px;width:360px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-title{font-weight:700;font-size:15px;margin-bottom:14px;text-align:center}
.modal-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:14px;outline:none;margin-bottom:14px}
.modal-input:focus{border-color:var(--primary)}
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:14px}
.emoji-opt{width:100%;aspect-ratio:1;border:2px solid var(--border);border-radius:10px;background:#fff;font-size:20px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.emoji-opt:hover{border-color:var(--primary);transform:scale(1.1);background:var(--primary-pale)}
.emoji-opt.selected{border-color:var(--primary);background:var(--primary-pale);box-shadow:0 0 0 2px var(--primary)}
.color-row{display:flex;gap:8px;margin-bottom:14px;justify-content:center;flex-wrap:wrap}
.color-opt{width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .15s}
.color-opt:hover{transform:scale(1.15)}
.color-opt.selected{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-pale)}
.modal-actions{display:flex;gap:8px}
.modal-btn{flex:1;padding:10px;border:none;border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .2s}
.modal-btn.primary{background:var(--primary);color:#fff}.modal-btn.primary:hover{background:var(--primary-light)}
.modal-btn.danger{background:var(--danger-light);color:var(--danger)}.modal-btn.danger:hover{background:#F5C6C0}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;padding:11px 22px;border-radius:12px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:all .3s ease;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.floor-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.floor-tag{font-size:10px;padding:1px 7px;border-radius:100px;font-weight:600;font-family:'Outfit','Noto Sans KR',sans-serif;background:#EEF2FF;color:#4338CA;white-space:nowrap}
.floor-tag.f-done{background:#ECFDF5;color:#059669;text-decoration:line-through}

/* ═══ FLOATING SAVE BUTTON ═══ */
.fab-save{position:fixed;bottom:24px;right:24px;z-index:50;width:56px;height:56px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(59,130,246,.4);display:flex;align-items:center;justify-content:center;transition:all .3s;-webkit-tap-highlight-color:transparent}
.fab-save:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(59,130,246,.5)}
.fab-save:active{transform:scale(.95)}
.fab-save.saved{background:var(--complete);box-shadow:0 4px 16px rgba(16,185,129,.4)}
.save-indicator{position:fixed;bottom:88px;right:14px;z-index:50;background:rgba(16,185,129,.95);color:#fff;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;white-space:nowrap}
.save-indicator.show{opacity:1;transform:translateY(0)}
.fab-sync{position:fixed;bottom:88px;right:28px;z-index:50;width:40px;height:40px;border-radius:50%;background:var(--card);color:var(--text-sub);border:1px solid var(--border);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:all .2s;-webkit-tap-highlight-color:transparent}
.fab-sync:active{transform:scale(.9)}
.sync-dot{width:8px;height:8px;border-radius:50%;position:absolute;top:2px;right:2px;border:1.5px solid #fff}
.sync-dot.online{background:#10B981}.sync-dot.offline{background:#94A3B8}.sync-dot.error{background:#EF4444}
.sync-dot.loading{background:#F59E0B;animation:syncPulse 1s infinite}
@keyframes syncPulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-info{font-size:11px;color:var(--text-sub);line-height:1.7;margin-bottom:12px}
.sync-info b{color:var(--text);font-weight:600}
.sync-steps{font-size:11px;color:var(--text-sub);line-height:1.8;margin-bottom:16px;padding:10px 12px;background:var(--sub-bg);border-radius:8px}
.sync-steps b{color:var(--text);font-weight:600}

office:[{id:'stationery',icon:'✏️',title:'문구류',color:'#FEF3C7',items:[{name:'필기구',note:'',subs:['볼펜','사인펜','형광펜','네임펜']},{name:'연필/샤프',note:'',subs:['연필','샤프','지우개','샤프심']},{name:'메모지/포스트잇',note:'',subs:['포스트잇(소)','포스트잇(대)','메모지']},{name:'스테이플러/심',note:'',subs:['스테이플러','심','제침기']},{name:'가위/풀/테이프',note:'',subs:['가위','딱풀','테이프']},{name:'클립류',note:'',subs:['종이클립','바인더클립(소)','바인더클립(대)']}]},{id:'paper',icon:'📄',title:'용지/인쇄',color:'#DBEAFE',items:[{name:'복사용지',note:'',subs:['A4','A3']},{name:'프린터 소모품',note:'기종확인',subs:['토너(검정)','토너(컬러)','잉크카트리지']},{name:'봉투',note:'',subs:['서류봉투','우편봉투','대봉투']}]},{id:'organize',icon:'📁',title:'정리/수납',color:'#D1FAE5',items:[{name:'화일/클리어파일',note:'',subs:['클리어파일','L자홀더']},{name:'바인더',note:'',subs:['링바인더','레버화일','인덱스탭']}]},{id:'tech',icon:'💻',title:'IT/전자기기',color:'#EDE9FE',items:[{name:'충전케이블',note:'공용 비치',subs:['C타입','8핀','5핀']},{name:'멀티탭',note:'안전인증',subs:['멀티탭(3구)','멀티탭(6구)','연장선']},{name:'건전지',note:'',subs:['AA','AAA']}]},{id:'o_clean',icon:'🧼',title:'사무실 위생',color:'#CFFAFE',items:[{name:'티슈/핸드타올',note:'',subs:['각티슈','미니티슈','핸드타올']},{name:'물티슈',note:'',subs:[]},{name:'쓰레기봉투',note:'',subs:['일반(소)','재활용']},{name:'손소독제',note:'',subs:[]},{name:'청소용품',note:'',subs:['먼지떨이','물걸레']}]}]};

let spaces=[],cats={},items=[],asp='',afl='2F',cf='all',openSubs={};

// ═══ CLOUD SYNC (GitHub API) ═══
const GH_OWNER='netformrnd',GH_REPO='su_ck',GH_BRANCH='main',GH_FILE='data.json';

async function cloudLoad(){
  try{
    const dot=document.getElementById('syncStatus');if(dot)dot.className='sync-dot loading';
    const pat=localStorage.getItem('gh_pat');
    const h={'Accept':'application/vnd.github.v3.raw','Cache-Control':'no-cache'};
    if(pat)h['Authorization']='token '+pat;
    const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}?ref=${GH_BRANCH}&_=${Date.now()}`,{headers:h});
    if(!r.ok){if(dot)dot.className='sync-dot '+(pat?'online':'offline');return false}
    const d=await r.json();
    if(d.spaces&&d.cats&&d.items){
      spaces=d.spaces;cats=d.cats;items=d.items;asp=d.asp||spaces[0]?.id||'';afl=d.afl||'2F';
      save();if(dot)dot.className='sync-dot online';return true;
    }
  }catch(e){console.log('cloudLoad:',e)}
  const dot=document.getElementById('syncStatus');if(dot)dot.className='sync-dot offline';
  return false;
}

async function cloudSave(){
  const pat=localStorage.getItem('gh_pat');
  if(!pat){showSyncSetup();return}
  const dot=document.getElementById('syncStatus');if(dot)dot.className='sync-dot loading';
  const data=JSON.stringify({spaces,cats,items,asp,afl},null,2);
  const content=btoa(unescape(encodeURIComponent(data)));
  let sha='';
  try{
    const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}?ref=${GH_BRANCH}`,{
      headers:{'Authorization':'token '+pat}});
    if(r.ok){const d=await r.json();sha=d.sha}
  }catch(e){}
  const body={message:'데이터 업데이트 '+new Date().toLocaleString('ko-KR'),content,branch:GH_BRANCH};
  if(sha)body.sha=sha;
  try{
    const r=await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`,{
      method:'PUT',headers:{'Authorization':'token '+pat,'Content-Type':'application/json'},
      body:JSON.stringify(body)});
    if(r.ok){toast('☁️ 클라우드 동기화 완료');if(dot)dot.className='sync-dot online'}
    else if(r.status===401||r.status===403){toast('⚠️ 토큰 오류 — 설정 확인');if(dot)dot.className='sync-dot error'}
    else{toast('⚠️ 동기화 실패');if(dot)dot.className='sync-dot error'}
  }catch(e){toast('⚠️ 네트워크 오류');if(dot)dot.className='sync-dot error'}
}

function showSyncSetup(){
  const cur=localStorage.getItem('gh_pat')||'';
  const status=cur?'<span style="color:#10B981">● 연결됨</span>':'<span style="color:#94A3B8">● 미연결</span>';
  document.getElementById('mBox').innerHTML=
    `<div class="modal-title">☁️ 클라우드 동기화 설정</div>`+
    `<div class="sync-info">상태: ${status}<br>저장 버튼(💾)을 누르면 모든 기기에서<br>동일한 데이터를 볼 수 있습니다.</div>`+
    `<div class="sync-steps"><b>GitHub 토큰 생성 방법:</b><br>`+
    `1. <a href="https://github.com/settings/tokens/new" target="_blank" style="color:var(--accent)">GitHub 토큰 생성 페이지</a> 접속<br>`+
    `2. Note: <b>su_ck</b> 입력<br>`+
    `3. Expiration: <b>No expiration</b> 선택<br>`+
    `4. ✅ <b>repo</b> 체크<br>`+
    `5. <b>Generate token</b> 클릭 후 복사</div>`+
    `<input class="modal-input" id="patInput" type="password" value="${cur}" placeholder="ghp_xxxxxxxxxxxx" style="font-family:monospace;font-size:13px"/>`+
    `<div class="modal-actions">`+
    (cur?`<button class="modal-btn danger" onclick="clearPat()">연결 해제</button>`:'')+
    `<button class="modal-btn" onclick="closeM()">취소</button>`+
    `<button class="modal-btn primary" onclick="savePat()">저장</button></div>`;
  document.getElementById('modal').classList.add('show');
}
function savePat(){
  const v=document.getElementById('patInput').value.trim();
  if(v){localStorage.setItem('gh_pat',v);toast('🔑 토큰 저장 완료');
    document.getElementById('syncStatus').className='sync-dot online';
    cloudSave();}
  else{localStorage.removeItem('gh_pat');document.getElementById('syncStatus').className='sync-dot offline'}
  closeM();
}
function clearPat(){localStorage.removeItem('gh_pat');toast('🔑 연결 해제');document.getElementById('syncStatus').className='sync-dot offline';closeM()}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
// Get floor state for item/sub
function gfAgg(o){if(!o.floors)o.floors={};let need=false,done=true,qty=0,hn=false;FLOORS.forEach(f=>{if(!o.floors[f])o.floors[f]={need:false,qty:1,done:false};if(o.floors[f].need){need=true;hn=true;qty+=o.floors[f].qty;if(!o.floors[f].done)done=false}});if(!hn)done=false;return{need,qty:qty||1,done}}
function gf(o){if(!o.floors)o.floors={};if(afl==='ALL')return gfAgg(o);if(!o.floors[afl])o.floors[afl]={need:false,qty:1,done:false};return o.floors[afl]}

async function init(){
  const s=localStorage.getItem('cl_v7');
  if(s){const d=JSON.parse(s);spaces=d.spaces;cats=d.cats;items=d.items;asp=d.asp||spaces[0]?.id||'';afl=d.afl||'2F'}
  else buildDef();
  updDate();rFloors();rTabs();render();
  // 클라우드에서 최신 데이터 로드 시도
  const loaded=await cloudLoad();
  if(loaded){rFloors();rTabs();render()}
}
function buildDef(){
  spaces=DS.map(s=>({...s}));cats={};items=[];
  const defFloors={};FLOORS.forEach(f=>{defFloors[f]={need:false,qty:1,done:false}});
  spaces.forEach(sp=>{
    const dc=DC[sp.id]||[];
    cats[sp.id]=dc.map(c=>({id:c.id,icon:c.icon,title:c.title,color:c.color}));
    dc.forEach(cat=>cat.items.forEach(it=>{
      items.push({id:uid(),space:sp.id,cat:cat.id,name:it.name,note:it.note,floors:JSON.parse(JSON.stringify(defFloors)),
        subs:(it.subs||[]).map(n=>({id:uid(),name:n,floors:JSON.parse(JSON.stringify(defFloors))}))});
    }));
  });
  asp=spaces[0]?.id||'';afl='2F';
}
function updDate(){document.getElementById('dateDisplay').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'long'})+' 기준'}

// ═══════ FLOOR SELECTOR ═══════
function rFloors(){
  const allN=items.reduce((a,i)=>{let c=FLOORS.some(f=>{const fs=i.floors&&i.floors[f];return fs&&fs.need&&!fs.done})?1:0;c+=i.subs.reduce((b,s)=>b+(FLOORS.some(f=>{const sf=s.floors&&s.floors[f];return sf&&sf.need&&!sf.done})?1:0),0);return a+c},0);
  document.getElementById('floorBar').innerHTML=`<button class="floor-btn ${afl==='ALL'?'active':''}" onclick="swFl('ALL')">📋 전체<span class="floor-badge ${allN===0?'zero':''}">${allN}</span></button>`+FLOORS.map(f=>{
    const n=items.reduce((a,i)=>{const fs=i.floors&&i.floors[f];let c=(fs&&fs.need&&!fs.done)?1:0;c+=i.subs.reduce((b,s)=>{const sf=s.floors&&s.floors[f];return b+((sf&&sf.need&&!sf.done)?1:0)},0);return a+c},0);
    return `<button class="floor-btn ${f===afl?'active':''}" onclick="swFl('${f}')">🏢 ${f}<span class="floor-badge ${n===0?'zero':''}">${n}</span></button>`;
  }).join('');
}
function swFl(f){afl=f;cf='all';document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter==='all'));rFloors();rTabs();render()}

// ═══════ TABS / RENDER / ITEMS / SUBS / CATS / SPACES ═══════
function rTabs(){
  document.getElementById('spaceTabs').innerHTML=spaces.map(sp=>{
    const n=items.filter(i=>i.space===sp.id).reduce((a,i)=>{const fs=gfFor(i,afl);let c=(fs.need&&!fs.done)?1:0;c+=i.subs.reduce((b,s)=>{const sf=gfFor(s,afl);return b+((sf.need&&!sf.done)?1:0)},0);return a+c},0);
    return `<button class="space-tab ${sp.id===asp?'active':''}" onclick="swSp('${sp.id}')"><span>${sp.icon}</span>${esc(sp.name)}<span class="tab-badge ${n===0?'zero':''}">${n}</span><span class="tab-edit-btn" onclick="event.stopPropagation();openSpEd('${sp.id}')">⚙</span></button>`;
  }).join('')+`<button class="add-space-tab" onclick="addSp()">＋</button>`;
}
function gfFor(o,f){if(!o.floors)o.floors={};if(f==='ALL')return gfAgg(o);if(!o.floors[f])o.floors[f]={need:false,qty:1,done:false};return o.floors[f]}
function swSp(id){asp=id;cf='all';document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter==='all'));rTabs();render()}

function render(){
  const c=document.getElementById('mc');c.innerHTML='';
  const si=items.filter(i=>i.space===asp),sc=cats[asp]||[];
  const allSubs=si.reduce((a,i)=>a.concat(i.subs),[]);
  document.getElementById('sT').textContent=si.length+allSubs.length;
  document.getElementById('sN').textContent=si.filter(d=>gf(d).need).length+allSubs.filter(s=>gf(s).need).length;
  document.getElementById('sP').textContent=si.filter(d=>gf(d).need&&!gf(d).done).length+allSubs.filter(s=>gf(s).need&&!gf(s).done).length;
  sc.forEach((cat,ci)=>{
    const cI=si.filter(d=>d.cat===cat.id),fi=filt(cI);if(fi.length===0&&cf!=='all')return;
    const nC=cI.filter(d=>gf(d).need).length+cI.reduce((a,i)=>a+i.subs.filter(s=>gf(s).need).length,0);
    const sec=document.createElement('div');sec.className='category';sec.style.animationDelay=(ci*.03)+'s';
    sec.innerHTML=`<div class="cat-header"><button class="cat-icon-btn" style="background:${cat.color}" onclick="openCatEd('${cat.id}')">${cat.icon}</button><input class="cat-title-edit" value="${esc(cat.title)}" onchange="updCT('${cat.id}',this.value)"/><div class="cat-count">${nC>0?'🛒 '+nC+'개':'✓'}</div><button class="small-btn" onclick="moveCat('${cat.id}',-1)">▲</button><button class="small-btn" onclick="moveCat('${cat.id}',1)">▼</button><button class="small-btn del" onclick="delCat('${cat.id}')">🗑</button><button class="cat-toggle" onclick="togCol(this)">▾</button></div><div class="cat-body" id="cb_${cat.id}">${fi.map(it=>rItem(it)).join('')}<div class="add-item-row"><input class="add-input" placeholder="+ 새 물품 추가..." onkeydown="if(event.key==='Enter')addIt('${cat.id}',this)"/><button class="add-btn" onclick="addIt('${cat.id}',this.previousElementSibling)">+</button></div></div>`;
    c.appendChild(sec);setupDrag(document.getElementById('cb_'+cat.id),'.item-card','item');
  });save();
}
function flTags(o){if(afl!=='ALL'||!gfAgg(o).need)return '';const pts=FLOORS.filter(fl=>o.floors&&o.floors[fl]&&o.floors[fl].need).map(fl=>`<span class="floor-tag ${o.floors[fl].done?'f-done':''}">${fl} ×${o.floors[fl].qty}</span>`);return pts.length?`<div class="floor-tags">${pts.join('')}</div>`:''}
function rItem(it){const f=gf(it),nc=f.need?'needs-purchase':'',dc=f.done?'completed':'',sc=f.done?'complete':'incomplete',st=f.done?'완료':'미완료';let visSubs=it.subs;if(cf==='need')visSubs=it.subs.filter(s=>gf(s).need);else if(cf==='pending')visSubs=it.subs.filter(s=>gf(s).need&&!gf(s).done);else if(cf==='done')visSubs=it.subs.filter(s=>gf(s).need&&gf(s).done);const sC=cf==='all'?it.subs.length:visSubs.length,isO=openSubs[it.id]||(cf!=='all'&&visSubs.length>0);const qtyHtml=afl==='ALL'?`<div class="qty-control" style="opacity:${f.need?1:0};pointer-events:none"><span class="qty-value">총${f.qty}</span></div>`:`<div class="qty-control"><button class="qty-btn" onclick="chgQ('${it.id}',-1)">−</button><span class="qty-value">${f.qty}</span><button class="qty-btn" onclick="chgQ('${it.id}',1)">+</button></div>`;return `<div class="item-card ${nc} ${dc}" data-id="${it.id}"><div class="item-main"><div class="drag-handle">${GRIP_SVG}</div><div class="need-check ${f.need?'checked':''}" onclick="togN('${it.id}')"></div><div class="item-info"><input class="item-name-edit" value="${esc(it.name)}" onchange="updI('${it.id}','name',this.value)" placeholder="물품명"/><input class="item-note-edit" value="${esc(it.note)}" onchange="updI('${it.id}','note',this.value)" placeholder="메모"/>${flTags(it)}</div><button class="expand-toggle ${isO?'open':''}" onclick="togSubPanel('${it.id}')">${isO?'▾':'▸'}${sC>0?`<span class="badge">${sC}</span>`:''}</button>${qtyHtml}<button class="status-toggle ${sc}" onclick="togD('${it.id}')" ${!f.need?'style="visibility:hidden"':''}>${st}</button><button class="item-delete" onclick="delIt('${it.id}')">✕</button></div><div class="sub-panel ${isO?'open':''}" data-parent="${it.id}">${visSubs.map(s=>rSub(it.id,s)).join('')}<div class="sub-add-row"><input class="sub-add-input" placeholder="+ 세부 항목 추가..." onkeydown="if(event.key==='Enter')addSub('${it.id}',this)"/><button class="sub-add-btn" onclick="addSub('${it.id}',this.previousElementSibling)">+</button></div></div></div>`}
function rSub(pid,s){const f=gf(s),nc=f.need?'sub-needs':'',dc=f.done?'sub-done':'',sc=f.done?'complete':'incomplete',st=f.done?'완료':'미완료';const sqHtml=afl==='ALL'?`<div class="sub-qty" style="opacity:${f.need?1:0};pointer-events:none"><span class="sub-qty-val">총${f.qty}</span></div>`:`<div class="sub-qty"><button class="sub-qty-btn" onclick="chgSQ('${pid}','${s.id}',-1)">−</button><span class="sub-qty-val">${f.qty}</span><button class="sub-qty-btn" onclick="chgSQ('${pid}','${s.id}',1)">+</button></div>`;return `<div class="sub-item ${nc} ${dc}" data-sid="${s.id}" data-pid="${pid}"><div class="drag-handle sub-handle">${GRIP_SVG}</div><div class="sub-check ${f.need?'checked':''}" onclick="togSN('${pid}','${s.id}')"></div><input class="sub-name-edit" value="${esc(s.name)}" onchange="updS('${pid}','${s.id}',this.value)"/>${flTags(s)}${sqHtml}<button class="sub-status ${sc}" onclick="togSD('${pid}','${s.id}')" ${!f.need?'style="visibility:hidden"':''}>${st}</button><button class="sub-del" onclick="delS('${pid}','${s.id}')">✕</button></div>`}
function filt(a){switch(cf){case 'need':return a.filter(i=>gf(i).need||i.subs.some(s=>gf(s).need));case 'pending':return a.filter(i=>(gf(i).need&&!gf(i).done)||i.subs.some(s=>gf(s).need&&!gf(s).done));case 'done':return a.filter(i=>(gf(i).need&&gf(i).done)||i.subs.some(s=>gf(s).need&&gf(s).done));default:return a}}

// Drag
function setupDrag(container,sel,type){if(!container)return;container.querySelectorAll(':scope > '+sel).forEach(el=>{const h=el.querySelector('.drag-handle');if(!h)return;h.addEventListener('mousedown',e=>startDr(e,el,container,sel,type));h.addEventListener('touchstart',e=>startDr(e,el,container,sel,type),{passive:false})});container.querySelectorAll('.sub-panel.open').forEach(p=>{p.querySelectorAll(':scope > .sub-item').forEach(el=>{const h=el.querySelector('.sub-handle');if(!h)return;h.addEventListener('mousedown',e=>startDr(e,el,p,'.sub-item','sub'));h.addEventListener('touchstart',e=>startDr(e,el,p,'.sub-item','sub'),{passive:false})})})}
function startDr(e,el,con,sel,type){e.preventDefault();el.classList.add('dragging');const onM=e2=>{e2.preventDefault();const y=e2.touches?e2.touches[0].clientY:e2.clientY;[...con.querySelectorAll(':scope > '+sel)].forEach(s=>{s.classList.remove('drag-over-top','drag-over-bottom')});for(const sib of con.querySelectorAll(':scope > '+sel)){if(sib===el)continue;const r=sib.getBoundingClientRect(),mid=r.top+r.height/2;if(y<mid&&y>r.top-10){sib.classList.add('drag-over-top');break}else if(y>=mid&&y<r.bottom+10){sib.classList.add('drag-over-bottom');break}}};const onU=()=>{document.removeEventListener('mousemove',onM);document.removeEventListener('mouseup',onU);document.removeEventListener('touchmove',onM);document.removeEventListener('touchend',onU);el.classList.remove('dragging');let target=null,pos='';for(const sib of con.querySelectorAll(':scope > '+sel)){if(sib.classList.contains('drag-over-top')){target=sib;pos='before';break}if(sib.classList.contains('drag-over-bottom')){target=sib;pos='after';break}}[...con.querySelectorAll(':scope > '+sel)].forEach(s=>{s.classList.remove('drag-over-top','drag-over-bottom')});if(target&&target!==el)applyRe(el,target,pos,type)};document.addEventListener('mousemove',onM);document.addEventListener('mouseup',onU);document.addEventListener('touchmove',onM,{passive:false});document.addEventListener('touchend',onU)}
function applyRe(el,tg,pos,type){if(type==='item'){const fi=items.find(i=>i.id===el.dataset.id),ti=items.find(i=>i.id===tg.dataset.id);if(!fi||!ti||fi.cat!==ti.cat)return;const gi=items.indexOf(fi);items.splice(gi,1);const gti=items.indexOf(ti);items.splice(pos==='before'?gti:gti+1,0,fi);toast('↕ 순서 변경');render()}else if(type==='sub'){const pid=el.dataset.pid,p=items.find(i=>i.id===pid);if(!p)return;const fi=p.subs.findIndex(s=>s.id===el.dataset.sid),ti2=p.subs.findIndex(s=>s.id===tg.dataset.sid);if(fi<0||ti2<0)return;const[m]=p.subs.splice(fi,1);const nt=p.subs.findIndex(s=>s.id===tg.dataset.sid);p.subs.splice(pos==='before'?nt:nt+1,0,m);toast('↕ 순서 변경');render()}}
function moveCat(cid,dir){const arr=cats[asp]||[],idx=arr.findIndex(c=>c.id===cid),ni=idx+dir;if(ni<0||ni>=arr.length)return;[arr[idx],arr[ni]]=[arr[ni],arr[idx]];render()}

// Item actions (floor-aware)
function togN(id){const it=items.find(x=>x.id===id);if(!it)return;if(afl==='ALL'){const ag=gfAgg(it);const nv=!ag.need;FLOORS.forEach(f=>{const fl=gfFor(it,f);fl.need=nv;if(!nv){fl.done=false;fl.qty=1}})}else{const f=gf(it);f.need=!f.need;if(!f.need){f.done=false;f.qty=1}}rFloors();rTabs();render()}
function togD(id){
  const it=items.find(x=>x.id===id);if(!it)return;
  if(afl==='ALL'){const ag=gfAgg(it);if(!ag.need)return;const nv=!ag.done;FLOORS.forEach(f=>{const fl=it.floors&&it.floors[f];if(fl&&fl.need)fl.done=nv});toast(nv?'✅ 전체 완료':'⏳ 미완료')}
  else{const f=gf(it);if(!f.need)return;f.done=!f.done;toast(f.done?'✅ 완료':'⏳ 미완료')}
  rFloors();rTabs();render();
}
function chgQ(id,d){if(afl==='ALL')return;const it=items.find(x=>x.id===id);if(it){const f=gf(it);f.qty=Math.max(1,f.qty+d)}render()}
function updI(id,field,v){const it=items.find(x=>x.id===id);if(it)it[field]=v;save()}
function delIt(id){const it=items.find(x=>x.id===id);if(it&&confirm(`"${it.name}" 삭제?`)){items=items.filter(x=>x.id!==id);delete openSubs[id];toast('🗑 삭제');rFloors();rTabs();render()}}
function addIt(cid,inp){const n=inp.value.trim();if(!n)return;const defFloors={};FLOORS.forEach(f=>{defFloors[f]={need:false,qty:1,done:false}});items.push({id:uid(),space:asp,cat:cid,name:n,note:'',floors:JSON.parse(JSON.stringify(defFloors)),subs:[]});inp.value='';toast('✅ 추가');render()}

function togSubPanel(id){openSubs[id]=!openSubs[id];render()}
function togSN(pid,sid){const p=items.find(x=>x.id===pid);if(!p)return;const s=p.subs.find(x=>x.id===sid);if(!s)return;if(afl==='ALL'){const ag=gfAgg(s);const nv=!ag.need;FLOORS.forEach(f=>{const fl=gfFor(s,f);fl.need=nv;if(!nv){fl.done=false;fl.qty=1}})}else{const f=gf(s);f.need=!f.need;if(!f.need){f.done=false;f.qty=1}}rFloors();rTabs();render()}
function togSD(pid,sid){
  const p=items.find(x=>x.id===pid);if(!p)return;const s=p.subs.find(x=>x.id===sid);if(!s)return;
  if(afl==='ALL'){const ag=gfAgg(s);if(!ag.need)return;const nv=!ag.done;FLOORS.forEach(f=>{const fl=s.floors&&s.floors[f];if(fl&&fl.need)fl.done=nv});toast(nv?'✅ 전체 완료':'⏳ 미완료')}
  else{const f=gf(s);if(!f.need)return;f.done=!f.done;toast(f.done?'✅ 완료':'⏳ 미완료')}
  rFloors();rTabs();render();
}
function chgSQ(pid,sid,d){if(afl==='ALL')return;const p=items.find(x=>x.id===pid);if(!p)return;const s=p.subs.find(x=>x.id===sid);if(s){const f=gf(s);f.qty=Math.max(1,f.qty+d)}render()}
function updS(pid,sid,v){const p=items.find(x=>x.id===pid);if(!p)return;const s=p.subs.find(x=>x.id===sid);if(s)s.name=v;save()}
function delS(pid,sid){const p=items.find(x=>x.id===pid);if(!p)return;p.subs=p.subs.filter(x=>x.id!==sid);toast('🗑 삭제');render()}
function addSub(pid,inp){const n=inp.value.trim();if(!n)return;const p=items.find(x=>x.id===pid);if(!p)return;const defFloors={};FLOORS.forEach(f=>{defFloors[f]={need:false,qty:1,done:false}});p.subs.push({id:uid(),name:n,floors:JSON.parse(JSON.stringify(defFloors))});inp.value='';toast('✅ 추가');render()}

// Category
function updCT(cid,v){const c=(cats[asp]||[]).find(x=>x.id===cid);if(c)c.title=v;save()}
function delCat(cid){const c=(cats[asp]||[]).find(x=>x.id===cid);const n=items.filter(x=>x.space===asp&&x.cat===cid).length;if(c&&confirm(`"${c.title}" (${n}개) 삭제?`)){cats[asp]=cats[asp].filter(x=>x.id!==cid);items=items.filter(x=>!(x.space===asp&&x.cat===cid));toast('🗑 삭제');rFloors();rTabs();render()}}
function addCat(){const id='c_'+uid();if(!cats[asp])cats[asp]=[];cats[asp].push({id,icon:'📦',title:'새 카테고리',color:'#E2E3E5'});toast('✅ 추가');render();setTimeout(()=>{const i=document.querySelectorAll('.cat-title-edit');const l=i[i.length-1];if(l){l.focus();l.select()}},80)}
function openCatEd(cid){const cat=(cats[asp]||[]).find(x=>x.id===cid);if(!cat)return;document.getElementById('mBox').innerHTML=`<div class="modal-title">${esc(cat.title)} — 아이콘/색상</div><div class="emoji-grid">${CI_ICONS.map(e=>`<button class="emoji-opt ${cat.icon===e?'selected':''}" onclick="pCI('${cid}','${e}',this)">${e}</button>`).join('')}</div><div style="font-size:12px;font-weight:600;color:var(--text-sub);text-align:center;margin-bottom:8px">배경색</div><div class="color-row">${COLORS.map(c=>`<div class="color-opt ${cat.color===c?'selected':''}" style="background:${c}" onclick="pCC('${cid}','${c}',this)"></div>`).join('')}</div><div class="modal-actions"><button class="modal-btn primary" onclick="closeM()">확인</button></div>`;document.getElementById('modal').classList.add('show')}
function pCI(cid,e,el){const c=(cats[asp]||[]).find(x=>x.id===cid);if(c)c.icon=e;el.closest('.emoji-grid').querySelectorAll('.emoji-opt').forEach(x=>x.classList.toggle('selected',x.textContent===e))}
function pCC(cid,co,el){const c=(cats[asp]||[]).find(x=>x.id===cid);if(c)c.color=co;el.closest('.color-row').querySelectorAll('.color-opt').forEach(x=>x.classList.toggle('selected',x.style.background===co))}

// Space
function addSp(){const id='sp_'+uid();spaces.push({id,name:'새 구역',icon:'📦'});cats[id]=[];asp=id;toast('✅ 추가');rTabs();render();setTimeout(()=>openSpEd(id),150)}
function openSpEd(sid){const sp=spaces.find(x=>x.id===sid);if(!sp)return;document.getElementById('mBox').innerHTML=`<div class="modal-title">구역 설정</div><input class="modal-input" id="spNI" value="${esc(sp.name)}" placeholder="구역 이름"/><div style="font-size:12px;font-weight:600;color:var(--text-sub);text-align:center;margin-bottom:8px">아이콘</div><div class="emoji-grid">${SI_ICONS.map(e=>`<button class="emoji-opt ${sp.icon===e?'selected':''}" onclick="pSI('${sid}','${e}',this)">${e}</button>`).join('')}</div><div class="modal-actions">${spaces.length>1?`<button class="modal-btn danger" onclick="delSp('${sid}')">삭제</button>`:''}<button class="modal-btn primary" onclick="saveSp('${sid}')">저장</button></div>`;document.getElementById('modal').classList.add('show')}
function pSI(sid,e,el){const sp=spaces.find(x=>x.id===sid);if(sp)sp.icon=e;el.closest('.emoji-grid').querySelectorAll('.emoji-opt').forEach(x=>x.classList.toggle('selected',x.textContent===e))}
function saveSp(sid){const sp=spaces.find(x=>x.id===sid);if(!sp)return;const n=document.getElementById('spNI').value.trim();if(n)sp.name=n;closeM();rTabs();render();toast('✅ 저장')}
function delSp(sid){const sp=spaces.find(x=>x.id===sid);if(sp&&confirm(`"${sp.name}" 삭제?`)){spaces=spaces.filter(x=>x.id!==sid);delete cats[sid];items=items.filter(x=>x.space!==sid);if(asp===sid)asp=spaces[0]?.id||'';closeM();toast('🗑 삭제');rFloors();rTabs();render()}}

// UI
function closeM(){document.getElementById('modal').classList.remove('show');render()}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeM()});
function togCol(btn){const col=btn.classList.toggle('collapsed');const b=btn.closest('.cat-header').nextElementSibling;if(col){b.style.maxHeight=b.scrollHeight+'px';requestAnimationFrame(()=>{b.style.maxHeight='0px'})}else{b.style.maxHeight=b.scrollHeight+'px';setTimeout(()=>{b.style.maxHeight='none'},350)}}
document.querySelectorAll('.filter-btn').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');cf=btn.dataset.filter;render()}));

function exportList(){const sp=spaces.find(x=>x.id===asp);const aN=items.filter(d=>d.space===asp&&(gf(d).need||d.subs.some(s=>gf(s).need)));if(!aN.length){toast('구매 필요 물품 없음');return}let t=`📋 [${afl}] ${sp?sp.name:''} 구매 목록\n${'─'.repeat(24)}\n`;(cats[asp]||[]).forEach(cat=>{const ci=aN.filter(d=>d.cat===cat.id);if(!ci.length)return;t+=`\n${cat.icon} ${cat.title}\n`;ci.forEach(it=>{const f=gf(it);if(f.need)t+=`  ${f.done?'✅':'⬜'} ${it.name} × ${f.qty}개\n`;it.subs.filter(s=>gf(s).need).forEach(s=>{const sf=gf(s);t+=`    ${sf.done?'✅':'⬜'} └ ${s.name} × ${sf.qty}개\n`})})});const tN=aN.reduce((a,i)=>{let c=gf(i).need?1:0;c+=i.subs.filter(s=>gf(s).need).length;return a+c},0);const tP=aN.reduce((a,i)=>{let c=(gf(i).need&&!gf(i).done)?1:0;c+=i.subs.filter(s=>gf(s).need&&!gf(s).done).length;return a+c},0);t+=`\n${'─'.repeat(24)}\n총 ${tN}건 | 미완료 ${tP}건`;navigator.clipboard.writeText(t).then(()=>toast('📋 복사됨')).catch(()=>toast('복사 실패'))}

function save(){localStorage.setItem('cl_v7',JSON.stringify({spaces,cats,items,asp,afl}))}
function manualSave(){
  save();
  const btn=document.getElementById('fabSave');
  btn.classList.add('saved');btn.textContent='✓';
  setTimeout(()=>{btn.classList.remove('saved');btn.textContent='💾'},1500);
  const ind=document.getElementById('saveInd');
  ind.classList.add('show');clearTimeout(ind._t);
  ind._t=setTimeout(()=>ind.classList.remove('show'),1800);
  toast('💾 저장 중...');
  // 클라우드 동기화
  if(localStorage.getItem('gh_pat')){cloudSave()}else{toast('💾 로컬 저장 완료 (☁️ 동기화 미설정)')}
}
function saveToFile(){save();const data=JSON.stringify({spaces,cats,items,asp,afl},null,2);const blob=new Blob([data],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;const dt=new Date();const fn=`상비물품_${dt.getFullYear()}${String(dt.getMonth()+1).padStart(2,'0')}${String(dt.getDate()).padStart(2,'0')}.json`;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast('💾 파일 저장 완료')}
function loadFromFile(){const input=document.createElement('input');input.type='file';input.accept='.json';input.onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.spaces&&d.cats&&d.items){spaces=d.spaces;cats=d.cats;items=d.items;asp=d.asp||spaces[0]?.id||'';afl=d.afl||'2F';save();rFloors();rTabs();render();toast('📂 파일 불러오기 완료')}else{toast('잘못된 파일 형식')}}catch(err){toast('파일 읽기 실패')}};reader.readAsText(file)};input.click()}
function resetPurchaseStatus(){const sp=spaces.find(s=>s.id===asp);const label=afl==='ALL'?'전체 층':afl;if(!confirm(`[${label}] ${sp?sp.name:''} 구매 상태를 초기화하시겠습니까?\n(물품 목록은 유지됩니다)`))return;const floors=afl==='ALL'?FLOORS:[afl];items.filter(i=>i.space===asp).forEach(it=>{if(!it.floors)it.floors={};floors.forEach(fl=>{if(it.floors[fl]){it.floors[fl].need=false;it.floors[fl].done=false;it.floors[fl].qty=1}});it.subs.forEach(s=>{if(!s.floors)s.floors={};floors.forEach(fl=>{if(s.floors[fl]){s.floors[fl].need=false;s.floors[fl].done=false;s.floors[fl].qty=1}})})});cf='all';document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter==='all'));save();toast('🛒 구매 상태 초기화');rFloors();rTabs();render()}
function resetAll(){if(confirm('모든 데이터를 초기화?\n(물품 목록까지 전부 삭제됩니다)')){localStorage.removeItem('cl_v7');openSubs={};buildDef();rFloors();rTabs();render();toast('🔄 전체 초기화')}}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200)}

init();
</script>
</body>
</html>
